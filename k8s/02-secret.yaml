# WARNING: In production, NEVER store secrets in git.
# Use sealed-secrets, external-secrets-operator, or Vault instead.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: task-api
  labels:
    app.kubernetes.io/part-of: task-api
type: Opaque
stringData:
  DATABASE_PASSWORD: "taskpass123"
  # Full DATABASE_URL with real password — this overrides the ConfigMap value
  DATABASE_URL: "postgresql+asyncpg://taskuser:taskpass123@postgres-service:5432/taskdb"
