name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Build & Push ────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── Security Scan ──────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  # ─── Update Manifests ───────────────────────────────────────────────────
  update-manifests:
    name: Update Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in K8s manifest
        run: |
          sed -i "s|image: .*task-api.*|image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}|g" k8s/05-app.yaml

      - name: Update image tag in Terraform tfvars
        run: |
          sed -i "s|app_image.*=.*|app_image = \"ghcr.io/${{ github.repository }}:sha-${{ github.sha }}\"|g" terraform/environments/local/terraform.tfvars

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/05-app.yaml terraform/environments/local/terraform.tfvars
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update image to sha-${{ github.sha }} [skip ci]"
          git push
